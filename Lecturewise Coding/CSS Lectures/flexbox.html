<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
/* flexbox means flexible box that can auto adjust its size according
to the size of screen . it makes the website responsive for every screen */
    
/* if flex direction is row -> main axis -> horizontal , cross axis-> vertical
if flex direction is coloumn -> main axis -> vertical , cross axis -> horizontal */

    .container{
        height: 1000px;
        background-color: beige;
        border: 4px solid purple;
        display: flex;
        flex-direction:row; 
        flex-wrap: nowrap;
         /* flex wrap means items apni original size hold karenge 
         until there is no space to come in the next line */

        justify-content: space-evenly; /* main axis ke center me place hojayega content */
         
        /* align works according to cross axis and justify content wotks with main axis */
        align-items:start;
         align-content: start; /*maintains the gap created by wrap */
        }
    .box{
        height: 200px;
        width: 200px;
        border: 2px solid black;
        margin: 4px;
        flex-grow: 1;
    }
    #box1{
        background-color: white;
        order: 1;
        /* flex-shrink: 5; box 1 will shrink 5 times fastre than others */
        flex-grow:20;
        align-self: center;
    }
    #box2{
        background-color: white;
        order: 2;
    }
    #box3{
        background-color: white;
        order: -1;
    }
    #box4{
        background-color: white;
        order: -2;
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">Box 1</div>
        <div class="box" id="box2">Box 2</div>
        <div class="box" id="box3">Box 3</div>
        <div class="box" id="box4">Box 4</div>
    </div>
</body>
</html>

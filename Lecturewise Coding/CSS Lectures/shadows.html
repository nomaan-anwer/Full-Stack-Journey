<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: burlywood;
            height: 800px;
            border: 2px black solid;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            background-color: aqua;
            height: 300px;
            width: 300px;
            border: 2px black solid;
            text-align: center;
            box-shadow: 10px 10px 15px brown; /*box shadow: x-offset, y-offset, blur radius , color*/
            box-shadow: inset 10px 15px 5px gray; /*inward shadow */
            
        }
        img{
            
            height: 250px;
            width: 300px;
        }
        /* text shadow */
        h2{
            text-shadow:4px 7px 3px white ;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img src="Media Items/download.jpg" alt="">
            <h2>Oh My God!!</h2>
        </div>
    </div>
</body>
</html>

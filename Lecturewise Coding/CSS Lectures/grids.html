<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grids in CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            width: 100vw;
        }
        .container{
            height: 100%;
            width: 100%;
            background-color: black;
            display: grid;
            /* row-gap: 2rem;
            column-gap: 2rem; */
            /* short hand notation (gap : rowgap , column gap) */
            gap : 1rem 1rem;
            grid-template-rows: repeat(6,1fr);
            grid-template-columns: repeat(1,1fr);
       
        }
        .item{
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            background-image: linear-gradient(to top, #d5d4d0 0%, #d5d4d0 1%, #eeeeec 31%, #efeeec 75%, #e9e9e7 100%);
            
        }


        /* using media query for more than 768px */
        @media (min-width:768px)
        {
        
        .container{
            /* grid-template-rows: 100px 100px 100px; 3 rows of 100px */
            /* grid-template-rows: 1fr 2fr 1fr; 3 rows 1- 1 fraction part 2fr- 2 fraction part of whole grid size ..... */
            /* grid-template-rows: repeat(10,1fr); repeats 10 rows of 1 fraction size  */
            grid-template-rows: 1fr 1fr 1fr 1fr ;
            /* same for column counter */
            grid-template-columns: 1fr 1fr 1fr ;
        }


             /* Arranging grid column and rows by inspect option and getting exact numbers */
        .header{
            grid-column-start: 1;
            grid-column-end: 4;
        }
        .footer{
            grid-column-start: 1;
            grid-column-end: 4;

        }
        .sidebar{
            grid-row-start: 2;
            grid-row-end: 4;
        }
        .content1{
            grid-column-start: 2;
            grid-column-end: 4;
        }

        }
       
        

    </style>
</head>
<body>
    <div class="container">
        <div class="item header">Header</div>
        <div class="item sidebar">Sidebar</div>
        <div class="item content1">Content1</div>
        <div class="item content2">content2</div>
        <div class="item content3">content3</div>
        <div class="item footer">Footer</div>
       
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height:400px;
            width: 400px;
            background-color: beige;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px black solid;
            border-radius: 5px;
            transition: all 2s 0.3s linear;
        }
        .box:hover{
            /* transform: rotate(45deg) ; */
            cursor: pointer;
            /* transform: scale(0.5); increase or decrease the size  */
            /* transform: skew(45deg); it tilts 45 deg */
             /* transform: translate(500px , 400px); moves in direction given */
            transform: matrix(2,56,4,-2.3,50,6); /* it takes six parameters in 
            which there are scale x , skewy skewx scale y translatex translatey */
            }
        .container{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        p{
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <p> This is a Box <br> (Don't Hover me) </p>
        </div>
    </div>
</body>
</html>

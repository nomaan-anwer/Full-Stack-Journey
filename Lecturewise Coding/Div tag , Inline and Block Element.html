<!-- 
            BLOCK ELEMENT AND INLINE ELEMENT
    BLOCK Element : 
            - appers in next line always.
            - takes all the space from left to right.

    INLINE Element :
            - appears in same line.
            - takes only space of the content.
    
            Example - -->

    <!-- paragraph tag is a BLOCK ELEMENT -->
        <p style="background-color: aqua;">this is Block Element</p>
        <p style="background-color: yellow;">It appears in next line</p>

    <!-- span tag is an INline Element -->
        <span style="background-color: green;">this is an inline element</span>
        <span style="background-color: blue;">this appears on same line</span>

    <!-- Div tag is a Block element  -->
    <div style="background-color: aqua;">This is a Block element</div>
    <div style="background-color: goldenrod;">it appears on next line</div>

    <!-- display sttyle can convert a block into inline -->

        <div style="background-color: blueviolet; display: inline;">here its block but acting as inline</div>


    <!-- Got better understanding of how to use emmets 
            and grouping diff. elements -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- EMMET IMPLEMENTATION -->

    <!-- (p>img) Emmet shortcut -->
    <P>
        <img src="" alt="">
    
    </P>

    <!-- (p>p>p>p) Emmet shortcut -->
    <p>
        <p>
            <p>
                <p></p>
            </p>
        </p>
    </p>

    <!-- (p>h1) Emmet shortcut -->
    <p>
        <h1></h1>
    </p>

    <!-- (article+section) Emmet shortcut-->
     <article></article>
     <section></section>

    <!-- p{this is a paragraph} Emmet shortcut-->
    <p>this is a paragraph</p>

    <!-- h3{this is third heading}Emmet shortcut -->
    <h3>this is third heading</h3>

    <!-- anker tag emmet (a{click here}) -->
    <a href="">click here</a>

    <!-- similarly article{this is article} , section{my name is nomi} -->


     <!-- id and class emmets    -->

     <!-- (p#para1) ID Emmet shortcut -->
    <p id="para1"></p>

    <!-- (p.india) Class Emmet shortcut -->
    <p class="india"></p>

    <!-- similarly (section.here , section#hi , article.head , article#a1) Emmet shortcuts -->
    <article id="a1"></article>
    <article class="head"></article>
    <section id="hi"></section>
    <section class="here"></section>
    

</body>
</html>
